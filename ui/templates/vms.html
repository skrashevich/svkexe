{{template "layout.html" .}}

{{define "content"}}
<div class="page-header">
    <h1>Virtual Machines</h1>
    <button class="btn btn-primary"
        hx-get="/dashboard/vms/create"
        hx-target="#create-modal"
        hx-swap="innerHTML">
        + New VM
    </button>
</div>

<div id="create-modal"></div>

<div id="vm-list"
     hx-get="/dashboard/vms/list"
     hx-trigger="every 5s"
     hx-swap="innerHTML">
    {{template "vm_list_content" .}}
</div>
{{end}}
