{{define "key_row"}}
<tr id="key-row-{{.Provider}}" style="border-bottom:1px solid var(--border);">
    <td style="padding:12px; font-weight:500; text-transform:capitalize;">{{.Provider}}</td>
    <td style="padding:12px; font-family:monospace; color:var(--text-muted);">{{.Masked}}</td>
    <td style="padding:12px; color:var(--text-muted); font-size:13px;">{{formatTime .CreatedAt}}</td>
    <td style="padding:12px; text-align:right;">
        <button class="btn btn-danger btn-sm"
            hx-delete="/dashboard/keys/{{.Provider}}"
            hx-target="#key-row-{{.Provider}}"
            hx-swap="outerHTML"
            hx-confirm="Delete {{.Provider}} key?">
            Delete
        </button>
    </td>
</tr>
{{end}}
