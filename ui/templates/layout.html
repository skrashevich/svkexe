<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>svkexe</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ── Tokens ─────────────────────────────────────────────────────── */
        :root {
            --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
            --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;

            --bg: oklch(0.17 0.006 60);
            --bg-raised: oklch(0.21 0.007 60);
            --bg-inset: oklch(0.14 0.005 60);
            --line: oklch(0.28 0.008 60);
            --line-soft: oklch(0.23 0.007 60);

            --fg: oklch(0.96 0.006 80);
            --fg-dim: oklch(0.72 0.008 70);
            --fg-mute: oklch(0.52 0.008 70);

            --accent: oklch(0.76 0.18 45);
            --accent-fg: oklch(0.18 0.04 45);
            --accent-hover: oklch(0.72 0.17 45);

            --ok: oklch(0.78 0.14 150);
            --ok-dim: oklch(0.78 0.14 150 / 0.15);
            --warn: oklch(0.80 0.15 85);
            --warn-dim: oklch(0.80 0.15 85 / 0.15);
            --danger: oklch(0.65 0.22 25);
            --danger-dim: oklch(0.65 0.22 25 / 0.15);
            --stopped: oklch(0.60 0.02 250);
            --stopped-dim: oklch(0.60 0.02 250 / 0.15);

            --radius: 8px;
            --radius-lg: 12px;
        }

        /* ── Reset ──────────────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        a { color: inherit; text-decoration: none; }

        /* ── Nav ─────────────────────────────────────────────────────────── */
        .dash-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: oklch(0.17 0.006 60 / 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--line-soft);
        }
        .dash-nav-inner {
            display: flex;
            align-items: center;
            height: 56px;
            padding: 0 32px;
            max-width: 1200px;
            margin: 0 auto;
            gap: 32px;
        }
        .mark {
            font-family: var(--mono);
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: -0.02em;
            color: var(--fg);
            text-decoration: none;
            flex-shrink: 0;
        }
        .mark .bracket { color: var(--accent); }

        .dash-nav-links {
            display: flex;
            gap: 2px;
        }
        .dash-nav-links a {
            font-size: 0.84rem;
            font-weight: 500;
            color: var(--fg-mute);
            padding: 6px 14px;
            border-radius: 6px;
            transition: color 0.15s, background 0.15s;
        }
        .dash-nav-links a:hover {
            color: var(--fg);
            background: var(--bg-raised);
        }
        .dash-nav-links a.active {
            color: var(--fg);
            background: var(--line-soft);
        }
        .dash-nav-user {
            margin-left: auto;
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--fg-mute);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dash-nav-user::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--ok);
            flex-shrink: 0;
        }

        /* ── Main ────────────────────────────────────────────────────────── */
        .dash-main {
            padding: 40px 32px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ── Page header ─────────────────────────────────────────────────── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }
        .page-header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        /* ── Cards ───────────────────────────────────────────────────────── */
        .card {
            background: var(--bg-raised);
            border: 1px solid var(--line-soft);
            border-radius: var(--radius-lg);
            padding: 24px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            border-color: var(--line);
        }
        .card-title {
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: -0.01em;
        }

        /* ── Buttons ─────────────────────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: var(--mono);
            font-size: 0.78rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.15s, transform 0.1s, background 0.15s, border-color 0.15s;
            letter-spacing: 0.01em;
            white-space: nowrap;
            line-height: 1.4;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn-primary {
            background: var(--accent);
            color: var(--accent-fg);
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary {
            background: var(--bg-inset);
            color: var(--fg-dim);
            border: 1px solid var(--line);
        }
        .btn-secondary:hover { border-color: var(--accent); color: var(--fg); }
        .btn-danger {
            background: var(--danger-dim);
            color: var(--danger);
            border: 1px solid oklch(0.65 0.22 25 / 0.25);
        }
        .btn-danger:hover { background: oklch(0.65 0.22 25 / 0.25); }
        .btn-sm { padding: 5px 12px; font-size: 0.72rem; }
        .btn-outline {
            background: transparent;
            color: var(--fg-dim);
            border: 1px solid var(--line);
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

        /* ── Status badges ───────────────────────────────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--mono);
            font-size: 0.68rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 100px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .badge-running {
            background: var(--ok-dim);
            color: var(--ok);
        }
        .badge-running::before { background: var(--ok); }
        .badge-stopped {
            background: var(--stopped-dim);
            color: var(--stopped);
        }
        .badge-stopped::before { background: var(--stopped); }
        .badge-starting, .badge-pending {
            background: var(--warn-dim);
            color: var(--warn);
        }
        .badge-starting::before, .badge-pending::before {
            background: var(--warn);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        .badge-error {
            background: var(--danger-dim);
            color: var(--danger);
        }
        .badge-error::before { background: var(--danger); }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── Grid ────────────────────────────────────────────────────────── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        /* ── VM card specifics ───────────────────────────────────────────── */
        .vm-card-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .vm-card-name {
            font-family: var(--mono);
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--fg);
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }
        .vm-card-links {
            display: flex;
            gap: 6px;
        }
        .vm-link {
            font-family: var(--mono);
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--fg-mute);
            padding: 4px 10px;
            border: 1px solid var(--line);
            border-radius: 6px;
            transition: color 0.15s, border-color 0.15s;
            white-space: nowrap;
        }
        .vm-link:hover { color: var(--fg); border-color: var(--fg-dim); }
        .vm-link-accent { color: var(--accent); border-color: oklch(0.76 0.18 45 / 0.3); }
        .vm-link-accent:hover { border-color: var(--accent); }

        .vm-card-specs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 16px;
            margin-bottom: 16px;
            padding: 12px 14px;
            background: var(--bg-inset);
            border: 1px solid var(--line-soft);
            border-radius: var(--radius);
        }
        .vm-spec {
            font-size: 0.75rem;
            color: var(--fg-mute);
        }
        .vm-spec-val {
            font-family: var(--mono);
            font-weight: 500;
            color: var(--fg-dim);
        }

        .vm-card-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        /* ── Tables ──────────────────────────────────────────────────────── */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .data-table thead th {
            text-align: left;
            padding: 10px 16px;
            font-family: var(--mono);
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--fg-mute);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-bottom: 1px solid var(--line);
        }
        .data-table tbody tr {
            border-bottom: 1px solid var(--line-soft);
            transition: background 0.15s;
        }
        .data-table tbody tr:last-child { border-bottom: none; }
        .data-table tbody tr:hover { background: var(--bg-inset); }
        .data-table tbody td {
            padding: 14px 16px;
        }
        .data-table .cell-mono {
            font-family: var(--mono);
            font-size: 0.78rem;
            color: var(--fg-mute);
        }
        .data-table .cell-name {
            font-weight: 600;
            text-transform: capitalize;
        }
        .data-table .cell-muted {
            color: var(--fg-mute);
            font-size: 0.8rem;
        }
        .data-table .cell-actions { text-align: right; }

        /* ── Forms ───────────────────────────────────────────────────────── */
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-family: var(--mono);
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--fg-mute);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            background: var(--bg-inset);
            border: 1px solid var(--line);
            color: var(--fg);
            padding: 10px 14px;
            border-radius: var(--radius);
            font-family: var(--sans);
            font-size: 0.88rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--fg-mute);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px oklch(0.76 0.18 45 / 0.12);
        }
        .form-group textarea {
            font-family: var(--mono);
            font-size: 0.82rem;
            resize: vertical;
            min-height: 80px;
        }
        .form-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 24px;
        }
        .form-hint {
            font-size: 0.78rem;
            color: var(--fg-mute);
            margin-bottom: 20px;
        }
        .form-inline {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .form-inline .form-group { margin-bottom: 0; }

        /* ── Modal ───────────────────────────────────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: oklch(0 0 0 / 0.65);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            animation: fade-in 0.15s ease-out;
        }
        .modal {
            width: 480px;
            max-width: calc(100vw - 48px);
            animation: slide-up 0.2s ease-out;
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .modal-header h2 {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .modal-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-inset);
            border: 1px solid var(--line);
            border-radius: 6px;
            color: var(--fg-mute);
            font-size: 14px;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s;
        }
        .modal-close:hover { color: var(--fg); border-color: var(--fg-dim); }

        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slide-up {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Empty state ─────────────────────────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 72px 24px;
            color: var(--fg-mute);
        }
        .empty-state h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--fg-dim);
        }
        .empty-state p {
            font-size: 0.88rem;
            margin-bottom: 24px;
            color: var(--fg-mute);
        }

        /* ── Alert ───────────────────────────────────────────────────────── */
        .alert-error {
            background: var(--danger-dim);
            border: 1px solid oklch(0.65 0.22 25 / 0.25);
            color: var(--danger);
            padding: 12px 18px;
            border-radius: var(--radius);
            font-size: 0.85rem;
            margin-bottom: 24px;
        }

        /* ── Code block ──────────────────────────────────────────────────── */
        .code-block {
            background: var(--bg-inset);
            border: 1px solid var(--line-soft);
            border-radius: var(--radius);
            padding: 16px 20px;
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--fg-dim);
            line-height: 1.8;
        }
        .code-block .comment { color: var(--fg-mute); }
        .code-block .cmd { color: var(--fg); }

        /* ── Toast ───────────────────────────────────────────────────────── */
        #toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            display: none;
            background: var(--danger);
            color: var(--accent-fg);
            padding: 12px 20px;
            border-radius: var(--radius);
            font-family: var(--mono);
            font-size: 0.8rem;
            max-width: 420px;
            box-shadow: 0 8px 32px oklch(0 0 0 / 0.4);
            animation: slide-in-right 0.25s ease-out;
        }
        @keyframes slide-in-right {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ── HTMX ───────────────────────────────────────────────────────── */
        .htmx-indicator { opacity: 0; transition: opacity 200ms; }
        .htmx-request .htmx-indicator { opacity: 1; }
        .htmx-request .btn-label { display: none; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Responsive ──────────────────────────────────────────────────── */
        @media (max-width: 768px) {
            .dash-nav-inner { padding: 0 16px; gap: 16px; }
            .dash-main { padding: 24px 16px; }
            .grid { grid-template-columns: 1fr; }
            .form-inline { flex-direction: column; align-items: stretch; }
            .modal { width: calc(100vw - 32px); }
        }
    </style>
</head>
<body>
    <nav class="dash-nav">
        <div class="dash-nav-inner">
            <a href="/dashboard/vms" class="mark"><span class="bracket">[</span>svkexe<span class="bracket">]</span></a>
            <div class="dash-nav-links">
                <a href="/dashboard/vms">VMs</a>
                <a href="/dashboard/keys">Keys</a>
                <a href="/dashboard/ssh-keys">SSH</a>
            </div>
            {{if .User}}
            <div class="dash-nav-user">{{.User.Email}}</div>
            {{end}}
        </div>
    </nav>
    <div id="toast"></div>
    <main class="dash-main">
        {{template "content" .}}
    </main>
    <script>
        document.body.addEventListener('htmx:responseError', function(e) {
            var toast = document.getElementById('toast');
            toast.textContent = e.detail.xhr.responseText || 'Something went wrong';
            toast.style.display = 'block';
            toast.style.animation = 'none';
            toast.offsetHeight;
            toast.style.animation = '';
            setTimeout(function() { toast.style.display = 'none'; }, 5000);
        });

        // Active nav link
        (function() {
            var path = window.location.pathname;
            var links = document.querySelectorAll('.dash-nav-links a');
            links.forEach(function(link) {
                if (path.startsWith(link.getAttribute('href'))) {
                    link.classList.add('active');
                }
            });
        })();
    </script>
</body>
</html>
