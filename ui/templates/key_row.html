{{define "key_row"}}
<tr id="key-row-{{.Provider}}">
    <td class="cell-name">{{.Provider}}</td>
    <td class="cell-mono">{{.Masked}}</td>
    <td class="cell-muted">{{formatTime .CreatedAt}}</td>
    <td class="cell-actions">
        <button class="btn btn-danger btn-sm"
            hx-delete="/dashboard/keys/{{.Provider}}"
            hx-target="#key-row-{{.Provider}}"
            hx-swap="outerHTML"
            hx-confirm="Delete {{.Provider}} key?">
            Delete
        </button>
    </td>
</tr>
{{end}}
