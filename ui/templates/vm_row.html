{{define "vm_card"}}
<div class="card" id="vm-{{.ID}}">
    <div class="vm-card-head">
        <div>
            <div class="vm-card-name">{{.Name}}</div>
            <span class="badge badge-{{statusClass .Status}}">{{.Status}}</span>
        </div>
        {{if eq .Status "running"}}
        <div class="vm-card-links">
            <a href="https://shelley.{{.Name}}.{{domain}}/" target="_blank" class="vm-link vm-link-accent">
                Shelley
            </a>
            <a href="https://{{.Name}}.{{domain}}/" target="_blank" class="vm-link">
                Open &rarr;
            </a>
        </div>
        {{end}}
    </div>

    <div class="vm-card-specs">
        <div class="vm-spec">CPU <span class="vm-spec-val">{{.CPULimit}} vCPU</span></div>
        <div class="vm-spec">RAM <span class="vm-spec-val">{{.MemoryMB}} MB</span></div>
        <div class="vm-spec">Disk <span class="vm-spec-val">{{.DiskGB}} GB</span></div>
        {{if .IPAddress}}<div class="vm-spec">IP <span class="vm-spec-val">{{.IPAddress}}</span></div>{{end}}
    </div>

    <div class="vm-card-actions">
        {{if eq .Status "stopped"}}
        <button class="btn btn-secondary btn-sm"
            hx-post="/dashboard/vms/{{.ID}}/start"
            hx-target="#vm-{{.ID}}"
            hx-swap="outerHTML">
            Start
        </button>
        {{else if eq .Status "running"}}
        <button class="btn btn-secondary btn-sm"
            hx-post="/dashboard/vms/{{.ID}}/stop"
            hx-target="#vm-{{.ID}}"
            hx-swap="outerHTML">
            Stop
        </button>
        {{end}}
        <button class="btn btn-danger btn-sm"
            hx-delete="/dashboard/vms/{{.ID}}"
            hx-target="#vm-{{.ID}}"
            hx-swap="outerHTML"
            hx-confirm="Delete VM '{{.Name}}'? This cannot be undone.">
            Delete
        </button>
    </div>
</div>
{{end}}
