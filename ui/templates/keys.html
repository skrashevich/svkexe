{{template "layout.html" .}}

{{define "content"}}
<div class="page-header">
    <h1>API Keys</h1>
</div>

<div class="card" style="margin-bottom:24px;">
    <div style="font-size:13px; color:var(--text-muted); margin-bottom:16px;">
        Keys auto-sync to running containers after update.
    </div>

    <form hx-put="/dashboard/keys/new" hx-target="#key-table-body" hx-swap="beforeend" hx-on::after-request="this.reset()">
        <div style="display:flex; gap:12px; align-items:flex-end;">
            <div class="form-group" style="margin-bottom:0; flex:0 0 180px;">
                <label>Provider</label>
                <select name="provider" required>
                    <option value="">Select provider</option>
                    <option value="anthropic">Anthropic</option>
                    <option value="openai">OpenAI</option>
                    <option value="gemini">Gemini</option>
                    <option value="fireworks">Fireworks</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom:0; flex:1;">
                <label>API Key</label>
                <input type="password" name="key" placeholder="Paste your API key..." required autocomplete="off">
            </div>
            <button type="submit" class="btn btn-primary" style="flex-shrink:0;">
                Save Key
            </button>
        </div>
    </form>
</div>

<div class="card">
    <table style="width:100%; border-collapse:collapse; font-size:14px;">
        <thead>
            <tr style="border-bottom:1px solid var(--border);">
                <th style="text-align:left; padding:10px 12px; color:var(--text-muted); font-weight:500; font-size:12px; text-transform:uppercase; letter-spacing:0.5px;">Provider</th>
                <th style="text-align:left; padding:10px 12px; color:var(--text-muted); font-weight:500; font-size:12px; text-transform:uppercase; letter-spacing:0.5px;">Key</th>
                <th style="text-align:left; padding:10px 12px; color:var(--text-muted); font-weight:500; font-size:12px; text-transform:uppercase; letter-spacing:0.5px;">Added</th>
                <th style="padding:10px 12px;"></th>
            </tr>
        </thead>
        <tbody id="key-table-body">
            {{range .Keys}}
                {{template "key_row" .}}
            {{else}}
            <tr id="keys-empty">
                <td colspan="4" style="padding:40px 12px; text-align:center; color:var(--text-muted);">No API keys saved yet.</td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>
{{end}}
