{{template "layout.html" .}}

{{define "content"}}
<div class="page-header">
    <h1>API Keys</h1>
</div>

<div class="card" style="margin-bottom:20px;">
    <div class="form-hint">Keys auto-sync to running containers after update.</div>
    <form hx-put="/dashboard/keys/new" hx-target="#key-table-body" hx-swap="beforeend" hx-on::after-request="this.reset()">
        <div class="form-inline">
            <div class="form-group" style="flex:0 0 200px;">
                <label>Provider</label>
                <select name="provider" required>
                    <option value="">Select provider</option>
                    <option value="anthropic">Anthropic</option>
                    <option value="openai">OpenAI</option>
                    <option value="gemini">Gemini</option>
                    <option value="fireworks">Fireworks</option>
                </select>
            </div>
            <div class="form-group" style="flex:1;">
                <label>API Key</label>
                <input type="password" name="key" placeholder="Paste your API key..." required autocomplete="off">
            </div>
            <button type="submit" class="btn btn-primary" style="flex-shrink:0;">
                Save Key
            </button>
        </div>
    </form>
</div>

<div class="card" style="padding:0; overflow:hidden;">
    <table class="data-table">
        <thead>
            <tr>
                <th>Provider</th>
                <th>Key</th>
                <th>Added</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="key-table-body">
            {{range .Keys}}
                {{template "key_row" .}}
            {{else}}
            <tr id="keys-empty">
                <td colspan="4" style="padding:48px 16px; text-align:center; color:var(--fg-mute);">No API keys saved yet.</td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>
{{end}}
