{{template "layout.html" .}}

{{define "content"}}
<div style="display:flex; align-items:center; gap:12px; margin-bottom:20px;">
    <a href="/dashboard/vms" class="btn btn-secondary btn-sm">&larr; VMs</a>
    <h1 style="font-size:1.1rem; font-weight:700; letter-spacing:-0.02em;">
        <span style="font-family:var(--mono);">{{.Container.Name}}</span>
    </h1>
    <span class="badge badge-{{statusClass .Container.Status}}">{{.Container.Status}}</span>
</div>

<div class="card" style="padding:0; overflow:hidden; border-radius:var(--radius-lg);">
    <div id="terminal" style="width:100%; height:calc(100vh - 180px);"></div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script>
(function() {
    var vmID = {{.Container.ID | js}};
    var wsURL = (location.protocol === 'https:' ? 'wss' : 'ws') + '://' + location.host + '/dashboard/vms/' + vmID + '/ws';

    var term = new Terminal({
        cursorBlink: true,
        fontSize: 14,
        fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace",
        theme: {
            background: '#1a1a26',
            foreground: '#e8e8ee',
            cursor: '#d4a040',
            cursorAccent: '#1a1a26',
            selectionBackground: 'rgba(212,160,64,0.2)',
            selectionForeground: '#e8e8ee',
            black:   '#2a2a3a',
            brightBlack: '#555570',
            red:     '#d06060',
            brightRed: '#e87070',
            green:   '#80b870',
            brightGreen: '#a0d890',
            yellow:  '#d4a040',
            brightYellow: '#e8c060',
            blue:    '#6090c0',
            brightBlue: '#80b0e0',
            magenta: '#a070b0',
            brightMagenta: '#c090d0',
            cyan:    '#60b0b0',
            brightCyan: '#80d0d0',
            white:   '#d0d0dc',
            brightWhite: '#f0f0f8'
        }
    });

    var fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    var ws;
    var reconnectDelay = 1000;

    function connect() {
        ws = new WebSocket(wsURL);
        ws.binaryType = 'arraybuffer';

        ws.onopen = function() {
            reconnectDelay = 1000;
            var dims = {type: 'resize', cols: term.cols, rows: term.rows};
            ws.send(JSON.stringify(dims));
        };

        ws.onmessage = function(e) {
            if (e.data instanceof ArrayBuffer) {
                term.write(new Uint8Array(e.data));
            } else {
                term.write(e.data);
            }
        };

        ws.onclose = function() {
            term.write('\r\n\x1b[33m[disconnected \u2014 reconnecting in ' + (reconnectDelay / 1000) + 's...]\x1b[0m\r\n');
            setTimeout(connect, reconnectDelay);
            reconnectDelay = Math.min(reconnectDelay * 2, 30000);
        };

        ws.onerror = function() {
            ws.close();
        };
    }

    term.onData(function(data) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(data);
        }
    });

    window.addEventListener('resize', function() {
        fitAddon.fit();
        if (ws && ws.readyState === WebSocket.OPEN) {
            var dims = {type: 'resize', cols: term.cols, rows: term.rows};
            ws.send(JSON.stringify(dims));
        }
    });

    connect();
})();
</script>
{{end}}
