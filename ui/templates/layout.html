<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>svkexe</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --accent: #0f3460;
            --accent2: #e94560;
            --text: #eaeaea;
            --text-muted: #8892a4;
            --border: #2a2d4a;
            --success: #4caf50;
            --warning: #ff9800;
            --stopped: #607d8b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Nav */
        nav {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            height: 56px;
            gap: 32px;
        }

        .nav-logo {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent2);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 4px;
            flex: 1;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            transition: color 0.15s, background 0.15s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text);
            background: var(--accent);
        }

        .nav-user {
            font-size: 13px;
            color: var(--text-muted);
            margin-left: auto;
        }

        /* Main */
        main {
            padding: 32px 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Cards */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: opacity 0.15s, background 0.15s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: var(--accent2); color: #fff; }
        .btn-secondary { background: var(--accent); color: var(--text); }
        .btn-danger { background: #c62828; color: #fff; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }

        /* Status badges */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-running { background: rgba(76,175,80,0.2); color: var(--success); }
        .badge-stopped { background: rgba(96,125,139,0.2); color: var(--stopped); }
        .badge-starting, .badge-pending { background: rgba(255,152,0,0.2); color: var(--warning); }
        .badge-error { background: rgba(198,40,40,0.2); color: #ef5350; }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        /* Page header */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .page-header h1 {
            font-size: 22px;
            font-weight: 600;
        }

        /* Form */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
        .form-group input, .form-group select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent2);
        }
        .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

        /* Modal overlay */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
        }
        .modal { width: 440px; }
        .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .modal-header h2 { font-size: 17px; font-weight: 600; }
        .modal-close { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; line-height: 1; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 64px 24px;
            color: var(--text-muted);
        }
        .empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }
        .empty-state p { font-size: 14px; margin-bottom: 20px; }

        /* HTMX indicator */
        .htmx-indicator { opacity: 0; transition: opacity 200ms; }
        .htmx-request .htmx-indicator { opacity: 1; }
    </style>
</head>
<body>
    <nav>
        <a href="/dashboard/vms" class="nav-logo">svkexe</a>
        <div class="nav-links">
            <a href="/dashboard/vms">VMs</a>
            <a href="/dashboard/keys">Keys</a>
            <a href="/dashboard/ssh-keys">SSH Keys</a>
        </div>
        {{if .User}}
        <div class="nav-user">{{.User.Email}}</div>
        {{end}}
    </nav>
    <main>
        {{template "content" .}}
    </main>
</body>
</html>
